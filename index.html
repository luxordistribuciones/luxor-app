<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Lista de precios Luxor Distribuciones">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Luxor">
  <title>Luxor Distribuciones</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ======= SPLASH ======= -->
  <div id="splash" class="screen">
    <div class="splash-content">
      <div class="logo-icon lg">L</div>
      <div class="splash-title">
        <span class="brand-main">LUXOR</span>
        <span class="brand-sub">DISTRIBUCIONES</span>
      </div>
      <div class="loader-track"><div class="loader-fill"></div></div>
    </div>
  </div>

  <!-- ======= SETUP (primera vez) ======= -->
  <div id="setup-screen" class="screen hidden">
    <div class="setup-wrap">
      <div class="setup-header">
        <div class="logo-icon lg">L</div>
        <h1>Luxor Distribuciones</h1>
        <p>Configuración inicial</p>
      </div>
      <div class="card">
        <h2>Conectar con Google Sheets</h2>
        <p>Ingresá la URL de tu Google Apps Script (Web App) para cargar los productos:</p>
        <input type="url" id="script-url-input"
          placeholder="https://script.google.com/macros/s/.../exec"
          autocomplete="off" spellcheck="false">
        <button id="save-config-btn" class="btn-red">Guardar y conectar</button>
        <div id="setup-error" class="error-box hidden"></div>
      </div>
    </div>
  </div>

  <!-- ======= APP PRINCIPAL ======= -->
  <div id="app" class="screen hidden">

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <div class="logo-icon sm">L</div>
        <div>
          <div class="brand-main sm">LUXOR</div>
          <div class="brand-sub">DISTRIBUCIONES</div>
        </div>
      </div>
      <div class="header-right">
        <span id="sync-status" class="sync-label"></span>
        <button id="sync-btn" class="icon-btn" title="Actualizar datos">
          <svg id="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <polyline points="23 20 23 14 17 14"></polyline>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <div class="search-inner">
        <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="search" id="search-input" placeholder="Buscar producto o código..." autocomplete="off">
        <button id="clear-search" class="clear-btn hidden">✕</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-strip">
      <div id="filter-pills" class="pills-row"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <span id="stats-text" class="stats-label">Cargando...</span>
    </div>

    <!-- Product list -->
    <div id="product-list" class="product-list"></div>

    <!-- Pagination -->
    <div id="pagination" class="pagination-bar"></div>

    <!-- Offline banner -->
    <div id="offline-banner" class="offline-banner hidden">📵 Sin conexión — mostrando datos guardados</div>

  </div><!-- /app -->

  <script src="app.js"></script>
</body>
</html>
